<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luka Lekić</title>

  <!-- Professional font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      height: 100vh;
      background: linear-gradient(180deg, #020617 0%, #0f172a 50%, #0ea5e9 100%);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Cursor */
    .cursor {
      width: 28px;
      height: 28px;
      border: 2px solid #38bdf8;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, background 0.2s;
      z-index: 999;
    }

    .cursor::after {
      content: "";
      width: 6px;
      height: 6px;
      background: #38bdf8;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .cursor.active {
      transform: translate(-50%, -50%) scale(1.6);
      background: rgba(56,189,248,0.15);
    }

    /* Banner */
    .banner {
      position: absolute;
      top: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: #f97316;
      color: #111;
      font-size: 13px;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* Layout */
    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 60px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #38bdf8, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Triangle layout */
    .triangle {
      position: relative;
      width: 280px;
      height: 260px;
    }

    .btn {
      position: absolute;
      width: 95px;
      height: 95px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.25s ease;
    }

    .btn {
  position: absolute;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: white;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  transition: box-shadow 0.25s ease, background 0.25s ease;
}

/* glow layer (ne pomera element) */
.btn::before {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,0.35), transparent 60%);
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: -1;
}

.btn:hover::before {
  opacity: 1;
}

.btn:hover {
  background: rgba(255,255,255,0.12);
}

    .btn:active {
      transform: scale(0.92);
    }

    /* Perfect triangle positions */
    .top {
      top: 0;
      left: 50%;
      transform: translate(-50%, 0);
    }

    .bottom-left {
      bottom: 0;
      left: 0;
    }

    .bottom-right {
      bottom: 0;
      right: 0;
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        overflow: auto;
      }

      .triangle {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        width: auto;
        height: auto;
      }

      .btn {
        position: static;
        width: 80%;
        height: auto;
        padding: 15px;
        border-radius: 12px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

<div class="cursor"></div>

<div class="banner">
  WEBSITE UNDER CONSTRUCTION
</div>

<div class="container">
  <h1>Luka Lekić</h1>

  <div class="triangle">
    <a href="https://instagram.com/iamlukalekic" class="btn top" target="_blank">IG</a>
    <a href="mailto:contact@lukalekic.com" class="btn bottom-left">Mail</a>
    <a href="https://x.com/iamlukalekic" class="btn bottom-right" target="_blank">X</a>
  </div>
</div>

<script>
  const cursor = document.querySelector('.cursor');

  document.addEventListener('mousemove', e => {
    cursor.style.top = e.clientY + 'px';
    cursor.style.left = e.clientX + 'px';
  });

  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => cursor.classList.add('active'));
    btn.addEventListener('mouseleave', () => cursor.classList.remove('active'));
  });
</script>

</body>
</html>
